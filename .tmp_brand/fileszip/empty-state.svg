<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" fill="none">
  <!-- Empty State: No Results -->
  
  <!-- Plate -->
  <ellipse cx="120" cy="130" rx="70" ry="12" fill="#E5E7EB"/>
  <ellipse cx="120" cy="120" rx="60" ry="50" fill="#F5F5F0" stroke="#E5E7EB" stroke-width="2"/>
  <ellipse cx="120" cy="120" rx="40" ry="33" fill="none" stroke="#E5E7EB" stroke-width="1.5"/>
  
  <!-- Sad face on plate -->
  <circle cx="108" cy="112" r="3" fill="#D1D5DB"/>
  <circle cx="132" cy="112" r="3" fill="#D1D5DB"/>
  <path d="M108 128 Q120 122 132 128" stroke="#D1D5DB" stroke-width="2" stroke-linecap="round" fill="none"/>
  
  <!-- Fork (left) -->
  <g transform="translate(40, 95) rotate(-20)">
    <rect x="0" y="0" width="2.5" height="12" rx="1" fill="#D1D5DB"/>
    <rect x="5" y="0" width="2.5" height="12" rx="1" fill="#D1D5DB"/>
    <rect x="10" y="0" width="2.5" height="12" rx="1" fill="#D1D5DB"/>
    <rect x="0" y="11" width="12.5" height="3" rx="1" fill="#D1D5DB"/>
    <rect x="4" y="14" width="4.5" height="20" rx="2" fill="#D1D5DB"/>
  </g>
  
  <!-- Knife (right) -->
  <g transform="translate(188, 95) rotate(20)">
    <path d="M0 0 L6 0 L6 16 L3 20 L0 16Z" fill="#D1D5DB"/>
    <rect x="1.5" y="18" width="3" height="18" rx="1.5" fill="#D1D5DB"/>
  </g>
  
  <!-- Question marks floating -->
  <text x="85" y="50" font-family="'DM Sans',Arial,sans-serif" font-size="20" font-weight="700" fill="#FFE0CC">?</text>
  <text x="150" y="40" font-family="'DM Sans',Arial,sans-serif" font-size="16" font-weight="700" fill="#FFE0CC">?</text>
  <text x="120" y="35" font-family="'DM Sans',Arial,sans-serif" font-size="24" font-weight="700" fill="#FF6B35" opacity="0.5">?</text>
  
  <!-- Text below -->
  <text x="120" y="170" text-anchor="middle" font-family="'DM Sans',Arial,sans-serif" font-size="14" font-weight="600" fill="#6B7280">Brak wyników</text>
  <text x="120" y="188" text-anchor="middle" font-family="'Source Sans 3',Arial,sans-serif" font-size="11" fill="#9CA3AF">Spróbuj dodać więcej składników</text>
</svg>
