<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 68" fill="none">
  <!-- ZjedzTo — Logo Horizontal / Light Background -->
  <!-- Direction B: Bowl + Fork signet -->

  <!-- SIGNET: Soft squircle container -->
  <rect x="2" y="2" width="64" height="64" rx="20" fill="#FF6B35"/>

  <!-- Bowl (soft half-circle at bottom) -->
  <path d="M16 36 C16 36 18 52 33 52 C48 52 50 36 50 36" 
        stroke="#fff" stroke-width="3" stroke-linecap="round" fill="none"/>
  
  <!-- Fork: 3 rounded tines -->
  <line x1="26" y1="16" x2="26" y2="30" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
  <line x1="33" y1="14" x2="33" y2="30" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
  <line x1="40" y1="16" x2="40" y2="30" stroke="#fff" stroke-width="3" stroke-linecap="round"/>

  <!-- Steam lines (gentle curved wisps) -->
  <path d="M24 10 C24 7 27 7 27 10" stroke="#fff" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M33 7 C33 4 36 4 36 7" stroke="#fff" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.5"/>
  <path d="M41 10 C41 7 44 7 44 10" stroke="#fff" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- WORDMARK -->
  <text x="80" y="46" font-family="'DM Sans','Helvetica Neue',Arial,sans-serif" font-weight="700" font-size="32" letter-spacing="-0.01em">
    <tspan fill="#1A1A2E">Zjedz</tspan><tspan fill="#FF6B35">To</tspan>
  </text>
</svg>
