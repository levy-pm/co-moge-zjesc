<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" fill="none">
  <!-- No Recipes Found -->
  
  <!-- Cookbook closed -->
  <rect x="70" y="40" width="100" height="80" rx="4" fill="#1A1A2E"/>
  <rect x="72" y="42" width="96" height="76" rx="3" fill="#2A2A4E"/>
  
  <!-- Book spine -->
  <rect x="70" y="40" width="12" height="80" rx="2" fill="#1A1A2E"/>
  
  <!-- Book cover decoration -->
  <circle cx="120" cy="70" r="15" fill="none" stroke="#FF6B35" stroke-width="2" opacity="0.6"/>
  <path d="M113 70 L120 63 L127 70 L120 77Z" fill="#FF6B35" opacity="0.4"/>
  
  <!-- X mark overlay -->
  <circle cx="145" cy="50" r="14" fill="#EF4444" opacity="0.9"/>
  <line x1="139" y1="44" x2="151" y2="56" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="151" y1="44" x2="139" y2="56" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Floating ingredient icons (scattered) -->
  <!-- Tomato -->
  <circle cx="50" cy="60" r="8" fill="#FF6B35" opacity="0.2"/>
  <path d="M48 54 Q50 50 52 54" stroke="#2ECC71" stroke-width="1.5" fill="none" opacity="0.3"/>
  
  <!-- Carrot -->
  <g transform="translate(185, 55) rotate(30)" opacity="0.2">
    <path d="M0 0 L4 20 L8 0Z" fill="#FF6B35"/>
    <path d="M2 -2 Q4 -5 6 -2" stroke="#2ECC71" stroke-width="1.5" fill="none"/>
  </g>
  
  <!-- Egg -->
  <ellipse cx="55" cy="105" rx="7" ry="9" fill="#FFE0CC" opacity="0.3"/>
  
  <!-- Text -->
  <text x="120" y="150" text-anchor="middle" font-family="'DM Sans',Arial,sans-serif" font-size="14" font-weight="600" fill="#6B7280">Brak przepisów</text>
  <text x="120" y="168" text-anchor="middle" font-family="'Source Sans 3',Arial,sans-serif" font-size="11" fill="#9CA3AF">Nie znaleźliśmy przepisów</text>
  <text x="120" y="182" text-anchor="middle" font-family="'Source Sans 3',Arial,sans-serif" font-size="11" fill="#9CA3AF">dla tych składników</text>
</svg>
