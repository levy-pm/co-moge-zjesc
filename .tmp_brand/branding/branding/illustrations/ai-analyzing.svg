<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" fill="none">
  <!-- AI Analyzing Ingredients -->
  
  <!-- Central brain/circuit icon -->
  <circle cx="120" cy="80" r="35" fill="#1A1A2E" opacity="0.05"/>
  <circle cx="120" cy="80" r="28" fill="none" stroke="#FF6B35" stroke-width="2" stroke-dasharray="4 3">
    <animateTransform attributeName="transform" type="rotate" from="0 120 80" to="360 120 80" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="120" cy="80" r="20" fill="none" stroke="#2ECC71" stroke-width="1.5" stroke-dasharray="3 4">
    <animateTransform attributeName="transform" type="rotate" from="360 120 80" to="0 120 80" dur="6s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Center search/AI icon -->
  <circle cx="116" cy="76" r="8" fill="none" stroke="#FF6B35" stroke-width="2.5"/>
  <line x1="122" y1="82" x2="128" y2="88" stroke="#FF6B35" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Ingredient nodes orbiting -->
  <!-- Tomato -->
  <circle cx="70" cy="50" r="10" fill="#FF6347" opacity="0.8"/>
  <path d="M68 44 Q70 40 72 44" stroke="#2ECC71" stroke-width="1.5" fill="none"/>
  
  <!-- Cheese -->
  <rect x="160" y="45" width="16" height="12" rx="2" fill="#FFD700" opacity="0.8"/>
  <circle cx="165" cy="51" r="1.5" fill="#FFA500"/>
  <circle cx="171" cy="49" r="1" fill="#FFA500"/>
  
  <!-- Onion -->
  <circle cx="168" cy="110" r="9" fill="#DDA0DD" opacity="0.7"/>
  <path d="M168 103 L168 100" stroke="#2ECC71" stroke-width="1.5"/>
  
  <!-- Pasta -->
  <g transform="translate(58, 100)" opacity="0.7">
    <path d="M0 8 Q8 0 16 8" stroke="#F4A460" stroke-width="2.5" fill="none"/>
    <path d="M2 12 Q10 4 18 12" stroke="#F4A460" stroke-width="2.5" fill="none"/>
  </g>
  
  <!-- Connection lines (dotted) -->
  <line x1="80" y1="55" x2="100" y2="70" stroke="#FF6B35" stroke-width="1" stroke-dasharray="2 2" opacity="0.4"/>
  <line x1="160" y1="55" x2="140" y2="70" stroke="#FF6B35" stroke-width="1" stroke-dasharray="2 2" opacity="0.4"/>
  <line x1="160" y1="105" x2="140" y2="90" stroke="#FF6B35" stroke-width="1" stroke-dasharray="2 2" opacity="0.4"/>
  <line x1="75" y1="105" x2="100" y2="90" stroke="#FF6B35" stroke-width="1" stroke-dasharray="2 2" opacity="0.4"/>
  
  <!-- Scanning lines effect -->
  <line x1="90" y1="80" x2="150" y2="80" stroke="#2ECC71" stroke-width="1" opacity="0.3">
    <animate attributeName="y1" values="65;95;65" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="65;95;65" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.1;0.4;0.1" dur="2s" repeatCount="indefinite"/>
  </line>
  
  <!-- Text -->
  <text x="120" y="150" text-anchor="middle" font-family="'DM Sans',Arial,sans-serif" font-size="14" font-weight="600" fill="#1A1A2E">Analizuję składniki...</text>
  
  <!-- Loading dots -->
  <circle cx="105" cy="168" r="3" fill="#FF6B35">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.2s" repeatCount="indefinite" begin="0s"/>
  </circle>
  <circle cx="120" cy="168" r="3" fill="#FF6B35">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite" begin="0.4s"/>
  </circle>
  <circle cx="135" cy="168" r="3" fill="#FF6B35">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite" begin="0.8s"/>
  </circle>
</svg>
