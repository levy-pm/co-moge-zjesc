<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 130" fill="none">
  <!-- ZjedzTo — Stacked Logo -->
  
  <!-- Icon centered -->
  <rect x="30" y="4" width="60" height="60" rx="14" fill="#FF6B35"/>
  
  <!-- Fork tines -->
  <rect x="43" y="14" width="4" height="14" rx="2" fill="#fff"/>
  <rect x="50" y="14" width="4" height="14" rx="2" fill="#fff"/>
  <rect x="57" y="14" width="4" height="14" rx="2" fill="#fff"/>
  <rect x="64" y="14" width="4" height="14" rx="2" fill="#fff"/>
  
  <!-- Top bar -->
  <rect x="43" y="26" width="25" height="4" rx="2" fill="#fff"/>
  
  <!-- Diagonal -->
  <path d="M66 28 L49 48 L45.5 45 L62.5 25Z" fill="#fff"/>
  
  <!-- Bottom bar -->
  <rect x="43" y="46" width="25" height="4" rx="2" fill="#fff"/>
  
  <!-- Search accent -->
  <circle cx="76" cy="50" r="5" fill="none" stroke="#fff" stroke-width="2.5"/>
  <line x1="79.5" y1="53.5" x2="83" y2="57" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Wordmark below -->
  <text x="60" y="96" text-anchor="middle" font-family="'DM Sans','Helvetica Neue',Arial,sans-serif" font-weight="700" font-size="24" letter-spacing="-0.02em">
    <tspan fill="#1A1A2E">Zjedz</tspan><tspan fill="#FF6B35">To</tspan>
  </text>
  
  <!-- Tagline -->
  <text x="60" y="114" text-anchor="middle" font-family="'Source Sans 3','Helvetica Neue',Arial,sans-serif" font-weight="400" font-size="11" fill="#6B7280" letter-spacing="0.08em">
    CO MOGĘ ZJEŚĆ?
  </text>
</svg>
