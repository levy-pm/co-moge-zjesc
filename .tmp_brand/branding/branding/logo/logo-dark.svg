<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 64" fill="none">
  <!-- ZjedzTo — Logo Dark Background Version -->
  
  <!-- ICON: Rounded square with fork-Z + search accent -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#FF6B35"/>
  
  <!-- Fork tines (top of Z) -->
  <rect x="15" y="12" width="4" height="14" rx="2" fill="#fff"/>
  <rect x="22" y="12" width="4" height="14" rx="2" fill="#fff"/>
  <rect x="29" y="12" width="4" height="14" rx="2" fill="#fff"/>
  <rect x="36" y="12" width="4" height="14" rx="2" fill="#fff"/>
  
  <!-- Top bar of Z -->
  <rect x="15" y="24" width="25" height="4" rx="2" fill="#fff"/>
  
  <!-- Diagonal of Z -->
  <path d="M38 26 L21 46 L17.5 43 L34.5 23Z" fill="#fff"/>
  
  <!-- Bottom bar of Z / handle -->
  <rect x="15" y="44" width="25" height="4" rx="2" fill="#fff"/>
  
  <!-- Search accent (small magnifier) -->
  <circle cx="48" cy="48" r="5" fill="none" stroke="#fff" stroke-width="2.5"/>
  <line x1="51.5" y1="51.5" x2="55" y2="55" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>

  <!-- WORDMARK — white text for dark backgrounds -->
  <text x="74" y="44" font-family="'DM Sans','Helvetica Neue',Arial,sans-serif" font-weight="700" font-size="30" letter-spacing="-0.02em">
    <tspan fill="#F5F5F0">Zjedz</tspan><tspan fill="#FF6B35">To</tspan>
  </text>
</svg>
