<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" fill="none">
  <!-- ZjedzTo — Stacked Logo with Tagline -->

  <!-- SIGNET centered -->
  <rect x="38" y="4" width="64" height="64" rx="20" fill="#FF6B35"/>

  <!-- Bowl -->
  <path d="M52 40 C52 40 54 56 69 56 C84 56 86 40 86 40" 
        stroke="#fff" stroke-width="3" stroke-linecap="round" fill="none"/>
  
  <!-- Fork: 3 rounded tines -->
  <line x1="62" y1="20" x2="62" y2="34" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
  <line x1="69" y1="18" x2="69" y2="34" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
  <line x1="76" y1="20" x2="76" y2="34" stroke="#fff" stroke-width="3" stroke-linecap="round"/>

  <!-- Steam -->
  <path d="M60 14 C60 11 63 11 63 14" stroke="#fff" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M69 11 C69 8 72 8 72 11" stroke="#fff" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.5"/>
  <path d="M77 14 C77 11 80 11 80 14" stroke="#fff" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- Wordmark below -->
  <text x="70" y="96" text-anchor="middle" font-family="'DM Sans','Helvetica Neue',Arial,sans-serif" font-weight="700" font-size="26" letter-spacing="-0.01em">
    <tspan fill="#1A1A2E">Zjedz</tspan><tspan fill="#FF6B35">To</tspan>
  </text>

  <!-- Tagline -->
  <text x="70" y="116" text-anchor="middle" font-family="'Source Sans 3','Helvetica Neue',Arial,sans-serif" font-weight="400" font-size="11" fill="#6B7280" letter-spacing="0.06em">
    DANIA I DESERY
  </text>
</svg>
