name: CI

on:
  pull_request:
    branches: ["**"]
  push:
    branches: ["main", "master"]

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Lint
        run: npm run lint --prefix frontend

      - name: Server tests
        run: npm run test:server

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Build deploy runtime
        run: npm run build:deploy

      - name: Verify deploy-ready artifacts
        run: npm run verify:deploy-ready

      - name: Optional dependency audit
        continue-on-error: true
        run: |
          npm audit --omit=dev --audit-level=high
          npm audit --prefix frontend --audit-level=high

  browser-smoke:
    runs-on: ubuntu-latest
    needs: quality-gates
    timeout-minutes: 25
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install Chromium for Playwright
        run: npx --prefix frontend playwright install --with-deps chromium

      - name: Browser smoke tests
        env:
          SMOKE_REQUIRED: "1"
        run: npm run test:smoke
